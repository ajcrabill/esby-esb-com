<style>
  *, *::before, *::after { box-sizing: border-box; }

  :root {
    --esb-dark: #2c3e50;
    --esb-blue: #3a6ea8;
    --esb-blue-light: #4d82c0;
    --esb-blue-dark: #2a5285;
    --esb-amber: #e8a000;
    --esb-bg: #f5f6f8;
    --esb-surface: #ffffff;
    --esb-border: #dde2ea;
    --esb-border-strong: #c5ccd8;
    --esb-text: #1a2533;
    --esb-text-secondary: #4a5568;
    --esb-text-muted: #718096;
    --esb-success: #276749;
    --esb-success-bg: #e8f5ee;
    --esb-error: #9b2c2c;

    --esb-warning: #7b4a00;
    --esb-warning-bg: #fffaf0;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;

  .breadcrumb-row { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }

  .user-strip-email { font-weight:500; color:var(--esb-blue); }
  .user-strip-divider { color:var(--esb-border-strong); }
  .user-strip-signout { background:none; border:none; padding:0; cursor:pointer; color:var(--esb-text-muted); font-size:0.875rem; text-decoration:underline; }
  .user-strip-signout:hover { color:var(--esb-error); }

  .portal-card { background:var(--esb-surface); border:1px solid var(--esb-border); border-radius:var(--radius-lg); box-shadow:var(--shadow-md); padding:32px; margin-bottom:24px; }

  .form-group { margin-bottom:16px; }

  .form-input { width:100%; padding:10px 14px; border:1px solid var(--esb-border-strong); border-radius:var(--radius-sm); font-size:0.9375rem; color:var(--esb-text); background:var(--esb-surface); transition:border-color var(--transition), box-shadow var(--transition); }
  .form-input:focus { outline:none; border-color:var(--esb-blue); box-shadow:0 0 0 3px rgba(58,110,168,0.12); }

  .btn { display:inline-flex; align-items:center; gap:8px; padding:10px 20px; border-radius:var(--radius-sm); font-size:0.9375rem; font-weight:600; cursor:pointer; border:none; transition:all var(--transition); }
  .btn:disabled { opacity:0.55; cursor:not-allowed; }
  .btn-primary { background:var(--esb-blue); color:#fff; }
  .btn-primary:hover:not(:disabled) { background:var(--esb-blue-dark); }

  .btn-sm { padding:6px 14px; font-size:0.8125rem; }

  .btn-ghost:hover:not(:disabled) { background:var(--esb-bg); }

  .alert { display:flex; align-items:flex-start; gap:10px; padding:10px 14px; border-radius:var(--radius-sm); font-size:0.875rem; margin-bottom:12px; }

  .badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:999px; font-size:0.75rem; font-weight:600; }

  .report-btn { background:none; border:none; cursor:pointer; padding:3px 6px; color:var(--esb-text-muted); font-size:0.75rem; border-radius:4px; border:1px solid var(--esb-border); white-space:nowrap; }

  .ca-panel-overlay { position:fixed; inset:0; z-index:900; background:rgba(0,0,0,0.4); opacity:0; pointer-events:none; transition:opacity 0.25s; }
  .ca-panel-overlay.open { opacity:1; pointer-events:auto; }
  .ca-panel { position:fixed; top:0; right:0; bottom:0; z-index:901; width:min(660px,92vw); background:var(--esb-surface); border-left:1px solid var(--esb-border); box-shadow:var(--shadow-lg); display:flex; flex-direction:column; transform:translateX(100%); transition:transform 0.25s ease; }

  .has-notes-badge { display:inline-flex; align-items:center; gap:3px; background:#fef3c7; color:#92400e; border:1px solid #fde68a; border-radius:4px; font-size:0.68rem; font-weight:700; padding:1px 5px; vertical-align:middle; margin-left:5px; }

  .ca-modal-overlay { position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,0.55); display:none; align-items:center; justify-content:center; padding:20px; }
  .ca-modal-overlay.open { display:flex; }
  .ca-modal { background:var(--esb-surface); border-radius:var(--radius-lg); width:100%; max-width:820px; max-height:88vh; display:flex; flex-direction:column; overflow:hidden; box-shadow:var(--shadow-lg); }
  .ca-modal-head { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; border-bottom:1px solid var(--esb-border); flex-shrink:0; }
  .ca-modal-title { font-weight:700; font-size:0.9375rem; color:var(--esb-dark); }
  .ca-modal-body { overflow-y:auto; padding:24px; }

  .ca-deny-overlay { position:fixed; inset:0; z-index:1100; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; padding:20px; }
  .ca-deny-overlay.open { display:flex; }
  .ca-deny-modal { background:var(--esb-surface); border-radius:var(--radius-lg); width:100%; max-width:440px; padding:28px; box-shadow:var(--shadow-lg); }

  .reviewed-btn { background:none; border:1px solid var(--esb-border-strong); color:var(--esb-text-muted); padding:3px 8px; border-radius:4px; cursor:pointer; font-size:0.75rem; font-weight:600; white-space:nowrap; }
  .reviewed-btn:hover { background:var(--esb-success-bg); border-color:var(--esb-success); color:var(--esb-success); }
  .reviewed-btn.is-reviewed { background:var(--esb-success-bg); border-color:var(--esb-success); color:var(--esb-success); }
  .guide-overlay { position:fixed; inset:0; z-index:1200; background:rgba(0,0,0,0.55); display:none; align-items:center; justify-content:center; padding:20px; }
  .guide-overlay.open { display:flex; }
  .guide-modal { background:var(--esb-surface); border-radius:var(--radius-lg); width:100%; max-width:860px; max-height:90vh; display:flex; flex-direction:column; overflow:hidden; box-shadow:var(--shadow-lg); }
  .guide-modal-head { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; border-bottom:1px solid var(--esb-border); flex-shrink:0; gap:12px; }
  .guide-modal-body { overflow-y:auto; padding:24px; flex:1; }
  .guide-modal-body h1,.guide-modal-body h2,.guide-modal-body h3 { color:var(--esb-dark); }

  .guide-modal-body th { background:var(--esb-bg); }
</style>

<script>
const API = 'https://esbcloud.taild49f53.ts.net:8444';
const TOKEN_KEY = 'gotb_token';
const USER_KEY = 'gotb_user';

const ICONS = {
  mail: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="22,4 12,13 2,4"/></svg>',
  arrow: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15,18 9,12 15,6"/></svg>',
  alertCircle: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
  check: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20,6 9,17 4,12"/></svg>',
  book: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>',
  clock: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>',
  lock: '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>',
};

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── API ───────────────────────────────────────────────────────────────────────
async function apiCall(method, path, body) {
  const headers = { 'Content-Type': 'application/json' };
  const token = localStorage.getItem(TOKEN_KEY);
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const opts = { method: method, headers: headers };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  if (!res.ok) {
    let msg = 'Request failed (' + res.status + ')';
    try { const d = await res.json(); msg = d.detail || d.message || msg; } catch(e) {}
    throw new Error(msg);
  }
  if (res.status === 204) return null;
  return res.json();
}

// ── Auth ──────────────────────────────────────────────────────────────────────
let currentUser = null;

function getToken() { return localStorage.getItem(TOKEN_KEY); }
function setToken(t) { localStorage.setItem(TOKEN_KEY, t); }
function clearToken() { localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(USER_KEY); }
function getCachedUser() { try { const u = localStorage.getItem(USER_KEY); return u ? JSON.parse(u) : null; } catch(e) { return null; } }
function setCachedUser(u) { localStorage.setItem(USER_KEY, JSON.stringify(u)); }

function hasFeature(slug) {
  if (!currentUser || !currentUser.features) return false;
  return currentUser.features.some(function(f) { return (typeof f === 'string' ? f : f.slug) === slug; });
}

async function loadUser() {
  if (!getToken()) return null;
  currentUser = getCachedUser();
  try {
    currentUser = await apiCall('GET', '/auth/me');
    setCachedUser(currentUser);
    return currentUser;
  } catch(e) { clearToken(); return null; }
}

function signOut() {
  clearToken(); currentUser = null;
  renderUserStrip(); render();
}

function renderUserStrip() {
  const el = document.getElementById('user-strip');
  if (!el) return;
  el.innerHTML = currentUser
    ? '<span class="user-strip-email">' + escHtml(currentUser.email) + '</span><span class="user-strip-divider">|</span><button class="user-strip-signout" onclick="signOut()">Sign out</button>'
    : '';
}

// ── OTP ───────────────────────────────────────────────────────────────────────
function otpStep(step) {
  ['email','code','loading'].forEach(function(s) {
    const el = document.getElementById('otp-step-' + s);
    if (el) el.classList.toggle('active', s === step);
  });
}

function showOtpError(step, msg) {
  const el = document.getElementById(step === 'email' ? 'otp-err-email' : 'otp-err-code');
  if (el) el.innerHTML = '<div class="alert alert-error mb-2">' + ICONS.alertCircle + ' ' + escHtml(msg) + '</div>';
}

function resetOtp() {
  otpStep('email');
  ['otp-err-email','otp-err-code'].forEach(function(id) { const e=document.getElementById(id); if(e) e.innerHTML=''; });
  const c = document.getElementById('otp-input-code'); if(c) c.value='';
}

async function requestOtp() {
  const emailEl = document.getElementById('otp-input-email');
  const email = emailEl ? emailEl.value.trim() : '';
  const errEl = document.getElementById('otp-err-email'); if(errEl) errEl.innerHTML='';
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showOtpError('email','Please enter a valid email address.'); return; }
  const btn = document.getElementById('otp-send-btn');
  if(btn) { btn.disabled=true; btn.innerHTML='<div class="spinner" style="width:16px;height:16px;"></div> Sending…'; }
  try {
    await apiCall('POST', '/auth/request', { email: email });
    const sentMsg = document.getElementById('otp-sent-msg');
    if(sentMsg) sentMsg.textContent = 'A 6-digit code has been sent to ' + email + '.';
    otpStep('code');
  } catch(e) {
    if(btn) { btn.disabled=false; btn.innerHTML=ICONS.mail+' Send Access Code'; }
    showOtpError('email', e.message||'Failed to send code.');
  }
}

async function verifyOtp() {
  const emailEl = document.getElementById('otp-input-email');
  const codeEl = document.getElementById('otp-input-code');
  const email = emailEl ? emailEl.value.trim() : '';
  const code = codeEl ? codeEl.value.trim() : '';
  const errEl = document.getElementById('otp-err-code'); if(errEl) errEl.innerHTML='';
  if (!code || code.length !== 6) { showOtpError('code','Please enter the 6-digit code from your email.'); return; }
  otpStep('loading');
  try {
    const result = await apiCall('POST', '/auth/verify', { email: email, code: code });
    setToken(result.token);
    currentUser = await apiCall('GET', '/auth/me');
    setCachedUser(currentUser);
    renderUserStrip(); render();
  } catch(e) {
    otpStep('code');
    showOtpError('code', e.message||'Invalid or expired code.');
  }
}

function caRelTime(epoch) {
  if (!epoch) return '—';
  const s = (Date.now() / 1000) - epoch;
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

function caStatusBadge(status) {
  const map = { pending:['ca-badge-pending','Pending'], published:['ca-badge-live','Published'], rejected:['ca-badge-denied','Rejected'] };
  const e = map[status] || ['ca-badge-pending', status];
  return '<span class="badge ' + e[0] + '">' + e[1] + '</span>';
}

async function loadDrafts(silent) {
  const tbody = document.getElementById('ca-tbody');
  if (!tbody) return;
  if (!silent) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:32px;"><div class="loading-state" style="justify-content:center"><div class="spinner"></div> Loading…</div></td></tr>';
  }
  try {
    const data = await apiCall('GET', '/admin/api/drafts?status=' + encodeURIComponent(caFilter.status));
    caItems = Array.isArray(data) ? data : [];
    renderCaTable();
    const pending = caItems.filter(function(i) { return i.status === 'pending'; }).length;
    document.title = (pending > 0 ? '(' + pending + ') ' : '') + 'Content Approvals — ESB Admin';
  } catch(e) {
    if (tbody) tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--esb-error);">Failed to load: ' + escHtml(e.message) + '</td></tr>';
  }

function renderCaTable() {
  const tbody = document.getElementById('ca-tbody');
  if (!tbody) return;
  let items = caItems;
  if (caFilter.site) items = items.filter(function(i) { return i.site_id === caFilter.site; });
  if (caFilter.search) {
    const q = caFilter.search.toLowerCase();
    items = items.filter(function(i) { return (i.title||'').toLowerCase().includes(q); });
  }
  const countEl = document.getElementById('ca-count-label');
  if (countEl) countEl.textContent = items.length + ' pending';
  if (!items.length) {
    tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><div class="empty-state-icon">📄</div><div class="empty-state-title">No pending drafts</div><p>Content will appear here when agents submit drafts.</p></div></td></tr>';
    return;
  }
  tbody.innerHTML = items.map(function(item) {
    const score = item.quality_score != null ? Math.round(item.quality_score * 10) / 10 : '—';
    const scoreCls = item.quality_score >= 8 ? 'color:var(--esb-success)' : item.quality_score >= 6 ? 'color:var(--esb-amber)' : item.quality_score != null ? 'color:var(--esb-error)' : '';
    return '<tr onclick="caPanelOpen(\'' + item.id + '\')">' +
      '<td><span style="font-size:0.78rem;font-weight:600;">' + escHtml(item.site_name || item.site_id) + '</span></td>' +

      '</td>' +
      '<td style="white-space:nowrap;font-size:0.85rem;font-weight:600;' + scoreCls + '">' + score + '</td>' +
      '<td style="white-space:nowrap;font-size:0.78rem;color:var(--esb-text-muted);">' + caRelTime(item.created_at) + '</td>' +
      '<td style="white-space:nowrap;font-size:0.78rem;color:var(--esb-text-muted);">' + caFmtDate(item.scheduled_for) + '</td>' +

function caSetView(view) {
  const editor = document.getElementById('ca-editor');
  const preview = document.getElementById('ca-preview');
  const tabSrc = document.getElementById('ca-tab-source');
  const tabPre = document.getElementById('ca-tab-preview');
  if (view === 'preview') {
    if (preview) {
      preview.srcdoc = '<style>body{font-family:Georgia,serif;font-size:14px;line-height:1.6;padding:20px;margin:0;color:#1a2533}h1,h2,h3{color:#2c3e50}table{border-collapse:collapse;width:100%}th,td{border:1px solid #ccc;padding:6px 10px}img{max-width:100%}</style>' + (editor ? editor.value : '');
      preview.classList.add('visible');
    }
    if (editor) editor.classList.add('hidden');
    if (tabSrc) tabSrc.classList.remove('active');
    if (tabPre) tabPre.classList.add('active');
  } else {
    if (preview) preview.classList.remove('visible');
    if (editor) editor.classList.remove('hidden');
    if (tabSrc) tabSrc.classList.add('active');
    if (tabPre) tabPre.classList.remove('active');
  }
}

async function caPanelOpen(id) {
  const ov = document.getElementById('ca-panel-overlay'); if(ov) ov.classList.add('open');

// ── Format epoch as readable date ─────────────────────────────────────────────
function caFmtDate(epoch) {
  if (!epoch) return '—';
  var d = new Date(epoch * 1000);
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}

// ── Reviewed toggle ───────────────────────────────────────────────────────────
async function caToggleReviewed(id, current, btn) {
  var next = current ? 0 : 1;
  btn.disabled = true;
  try {
    await apiCall('POST', '/admin/api/draft/' + id + '/mark-reviewed', { reviewed: next });
    var item = caItems.find(function(i) { return i.id == id; });
    if (item) item.human_reviewed = next;
    btn.classList.toggle('is-reviewed', !!next);
    btn.textContent = next ? '✓ Reviewed' : 'Mark Reviewed';
    btn.onclick = function() { caToggleReviewed(id, next, btn); };
  } catch(e) { alert('Failed: ' + e.message); }
  btn.disabled = false;
}

        '<div class="guide-modal-head" style="gap:12px;">' +
          '<select id="guide-site-select" class="ca-select" onchange="loadGuide(this.value)">' +
            '<option value="">— Select a site —</option>' + opts +
          '</select>' +
          '<button class="ca-panel-close" onclick="closeGuide()" title="Close">✕</button>' +
        '</div>' +
        '<div class="guide-modal-body" id="guide-modal-body"><p style="color:var(--esb-text-muted);">Select a site to view its content guide.</p></div>' +
      '</div>';
    overlay.addEventListener('click', function(e) { if (e.target === overlay) closeGuide(); });
    document.body.appendChild(overlay);
  }
  overlay.classList.add('open');
  if (siteId) {
    var sel = document.getElementById('guide-site-select');
    if (sel) sel.value = siteId;
    loadGuide(siteId);
  }
}

function closeGuide() {
  var overlay = document.getElementById('guide-overlay');
  if (overlay) overlay.classList.remove('open');
}

async function loadGuide(siteId) {
  if (!siteId) return;
  var body = document.getElementById('guide-modal-body');
  if (!body) return;
  body.innerHTML = '<div class="loading-state"><div class="spinner"></div> Loading guide…</div>';
  try {
    var data = await apiCall('GET', '/admin/api/guide/' + encodeURIComponent(siteId));
    var md = (data && data.content) ? data.content : '*No guide content found.*';
    body.innerHTML = (typeof marked !== 'undefined') ? marked.parse(md) : '<pre style="white-space:pre-wrap">' + escHtml(md) + '</pre>';
  } catch(e) {
    body.innerHTML = '<p style="color:var(--esb-error);">Failed to load guide: ' + escHtml(e.message) + '</p>';
  }
}

// ── Main render ───────────────────────────────────────────────────────────────
async function render() {
  if (!currentUser) { renderSignIn(); return; }
  if (!currentUser.is_admin && !hasFeature('gotb-admin')) { renderAccessDenied(); return; }
  renderAdminUI();
}

// ── Boot ──────────────────────────────────────────────────────────────────────
(async function() {
  await loadUser();
  renderUserStrip();
  await render();
})();
</script>
</body>
</html>
